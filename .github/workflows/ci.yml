name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install build dependencies
        run: pip install --upgrade pip setuptools wheel build

      - name: Build wheel (verify build works)
        run: python -m build --wheel

      - name: Install package
        run: pip install .

      - name: Smoke test (import check)
        run: |
          python -c "import xuanji; print('xuanji version:', xuanji.__version__)"
          python -c "from xuanji.perception import PerceptionEngine; print('PerceptionEngine OK')"
          python -c "from xuanji.hands import HandsEngine; print('HandsEngine OK')"
          python -c "from xuanji.llm.router import LLMRouter; print('LLMRouter OK')"
          python -c "from xuanji.memory import MemoryStore; print('MemoryStore OK')"
          python -c "from xuanji.security.red_team import RedTeam; print('RedTeam OK')"
          python -c "from xuanji.evolution import EvolutionEngine; print('EvolutionEngine OK')"
          python -c "from xuanji.workflow import WorkflowEngine; print('WorkflowEngine OK')"

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        cache: "pip"

      - name: Install build tools
        run: pip install --upgrade pip setuptools wheel build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/xuanji
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
